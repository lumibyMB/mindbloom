<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MindBloom | Lumi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="header">
      <h1>MindBloom</h1>
      <p class="subtitle">Lumi está aquí contigo 🌿</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="Escribe lo que sientes..."
        autocomplete="off"
      />
      <button id="sendBtn">Enviar</button>
    </div>

    <p class="disclaimer">
      Este chat no sustituye ayuda profesional.
    </p>

  </div>

  <script>
    function addMessage(role, text) {
      const chat = document.getElementById("chat");

      chat.innerHTML += `
        <div class="message ${role}">
          <p>${text}</p>
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      let userName = localStorage.getItem("userName");

      // 👉 PRIMERA VEZ → guardar nombre
      if (!userName) {
        localStorage.setItem("userName", message);

        addMessage("user", message);
        addMessage("bot", `Mucho gusto, ${message} 💖 ¿cómo te sientes hoy?`);

        input.value = "";
        return;
      }

      // 👉 conversación normal
      addMessage("user", message);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            userName
          })
        });

        const data = await response.json();

        addMessage("bot", data.reply);

      } catch (error) {
        console.error(error);
        addMessage("bot", "Error al enviar mensaje 😢");
      }

      input.value = "";
    }

    // 👉 botón
    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    // 👉 enviar con ENTER
    document.getElementById("input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });

    // 👉 mensaje inicial
    window.onload = () => {
      if (!localStorage.getItem("userName")) {
        addMessage("bot", "Hola 💖 soy Lumi. ¿Cómo te llamas?");
      }
    };
  </script>

</body>
</html>
