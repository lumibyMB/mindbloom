<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MindBloom | Lumi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="header">
      <h1>MindBloom</h1>
      <p class="subtitle">Lumi está aquí contigo 🌿</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="Escribe lo que sientes..."
        autocomplete="off"
      />
      <button onclick="sendMessage()">Enviar</button>
    </div>

    <p class="disclaimer">
      Este chat no sustituye ayuda profesional.
    </p>

  </div>

  <script>
    let isFirstMessage = true;

    function addMessage(role, text) {
      const chat = document.getElementById("chat");

      chat.innerHTML += `
        <div class="message ${role}">
          <p>${text}</p>
        </div>
      `;

      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value.trim();
      if (!message) return;

      let userName = localStorage.getItem("userName");

      // 🧠 CONTROL TOTAL DEL FLUJO (AQUÍ ESTÁ EL FIX)
      if (!userName) {

        // 💬 PRIMER MENSAJE → Lumi pregunta nombre (SIN backend)
        if (isFirstMessage) {
          addMessage("user", message);
          addMessage("bot", "Hola 💖 soy Lumi. ¿Cómo te llamas?");

          isFirstMessage = false;
          input.value = "";
          return;
        }

        // 🧠 SEGUNDO MENSAJE → guardar nombre
        localStorage.setItem("userName");
        userName = message;

        addMessage("userName", message);
        addMessage("bot", `Mucho gusto, ${userName} 💖 ¿cómo te sientes hoy?`);

        input.value = "";
        return;
      }

      // 💬 CONVERSACIÓN NORMAL (YA CON NOMBRE)
      addMessage("userName", message);

      try {
        const response = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            userName
          })
          
        });

        const data = await response.json();

        addMessage("bot", data.reply);

      } catch (error) {
        addMessage("bot", "Estoy teniendo un pequeño problema técnico.");
      }

      input.value = "";
    }

    // 💬 MENSAJE INICIAL AUTOMÁTICO
    window.onload = () => {
      const userName = localStorage.getItem("userName");

      if (!userName) {
        addMessage("bot", "Hola 💖 soy Lumi. ¿Cómo te llamas?");
        isFirstMessage = false;
      }
    };
  </script>

</body>
</html>
