<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MindBloom | Lumi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="header">
      <h1>MindBloom</h1>
      <p class="subtitle">Lumi está aquí contigo 🌿</p>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input 
        type="text" 
        id="input" 
        placeholder="Escribe lo que sientes..."
        autocomplete="off"
      />
      <button id="sendBtn">Enviar</button>
    </div>

    <p class="disclaimer">
      Este chat no sustituye ayuda profesional.
    </p>

  </div>

<script>
function addMessage(role, text) {
  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="message ${role}">
      <p>${text}</p>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}

// 🧠 LIMPIAR NOMBRE INTELIGENTE
function extractName(text) {
  let name = text.toLowerCase();

  name = name
    .replace(/me\s*y?a?m?o/i, "")         // me llamo / me yamo
    .replace(/soy/i, "")                 
    .replace(/soi/i, "")                 
    .replace(/mi\s*nombre\s*es/i, "")
    .trim();

  // quitar símbolos raros
  name = name.replace(/[^a-zA-ZáéíóúÁÉÍÓÚñÑ\s]/g, "");

  // tomar primera palabra
  name = name.split(" ")[0];

  // capitalizar
  if (name.length > 0) {
    name = name.charAt(0).toUpperCase() + name.slice(1);
  }

  return name;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  let userName = localStorage.getItem("userName");

  const invalidWords = ["hola", "hey", "hi", "buenas", "holi"];

  // 🧠 SI NO HAY NOMBRE
  if (!userName) {

    // 👉 si es saludo → pedir nombre
    if (invalidWords.includes(message.toLowerCase())) {
      addMessage("user", message);
      addMessage("bot", "Hola 💖 soy Lumi. ¿Cómo te llamas?");
      input.value = "";
      return;
    }

    // 👉 limpiar nombre inteligentemente
    let cleanName = extractName(message);

    // 👉 si no detecta nada válido → volver a pedir
    if (!cleanName || cleanName.length < 2) {
      addMessage("user", message);
      addMessage("bot", "no entendí bien tu nombre 😅 ¿cómo te llamas?");
      input.value = "";
      return;
    }

    // 👉 guardar nombre limpio
    localStorage.setItem("userName", cleanName);
    userName = cleanName;

    addMessage("user", message);
    addMessage("bot", `Mucho gusto, ${userName} 💖 ¿cómo te sientes hoy?`);

    input.value = "";
    return;
  }

  // 💬 conversación normal
  addMessage("user", message);

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message,
        userName
      })
    });

    const data = await response.json();

    addMessage("bot", data.reply);

  } catch (error) {
    console.error(error);
    addMessage("bot", "Error 😢");
  }

  input.value = "";
}

// botón
document.getElementById("sendBtn").addEventListener("click", sendMessage);

// enter
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

// 👉 inicio
window.onload = () => {
  localStorage.removeItem("userName");
  addMessage("bot", "Hola 💖 soy Lumi. ¿Cómo te llamas?");
};
</script>

</body>
</html>
